name: Build and deploy World Cup sleep site

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "20 */6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install time-zone data
        run: python -m pip install -r requirements.txt

      - name: Build static site from Hermai data
        env:
          HERMAI_KEY: ${{ secrets.HERMAI_KEY }}
        run: |
          mkdir -p site
          cp fifa_index.html site/index.html
          cp social-preview.png site/social-preview.png
          python build_data.py site/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
